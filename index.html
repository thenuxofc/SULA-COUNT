<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>SULA MD | Modern Countdown</title>
  <!-- Google Fonts + Premium Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(145deg, #f8fafc 0%, #eef2f5 100%);
      min-height: 100vh;
      overflow-x: hidden;
      color: #1a2c3e;
      position: relative;
    }

    /* Animated gradient background (modern, soft movement) */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(circle at 20% 30%, rgba(255,255,245,0.6) 0%, rgba(225,235,245,0.9) 100%);
      opacity: 0.7;
    }

    .animated-bg::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: repeating-linear-gradient(45deg, rgba(100,150,200,0.03) 0px, rgba(100,150,200,0.03) 2px, transparent 2px, transparent 8px);
      animation: slowShift 32s linear infinite;
      pointer-events: none;
    }

    @keyframes slowShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(30px, 30px) rotate(2deg); }
    }

    /* main container */
    .countdown-container {
      position: relative;
      z-index: 2;
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* premium glass card */
    .premium-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0,0,0,0.02), 0 0 0 1px rgba(148, 163, 184, 0.1) inset;
      width: 100%;
      padding: 2.5rem 2rem;
      transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.4s ease;
    }

    .premium-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 35px 50px -18px rgba(0, 0, 0, 0.25);
    }

    /* header area */
    .brand-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      background: #e9f0f9;
      backdrop-filter: blur(4px);
      padding: 0.3rem 1.1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #2c5a7a;
      margin-bottom: 1rem;
      border: 1px solid rgba(44, 90, 122, 0.2);
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1e3b4f, #2b5c7a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .subhead {
      font-size: 1rem;
      font-weight: 500;
      color: #4a627a;
      border-bottom: 1px solid #cbdde9;
      display: inline-block;
      padding-bottom: 0.3rem;
    }

    /* image container */
    .image-wrapper {
      display: flex;
      justify-content: center;
      margin: 1.8rem 0 2rem;
    }

    .release-art {
      max-width: 210px;
      width: 65%;
      border-radius: 1.8rem;
      box-shadow: 0 25px 30px -12px rgba(0, 0, 0, 0.25);
      transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      filter: brightness(1.01) contrast(1.02);
      border: 2px solid rgba(255,255,240,0.8);
    }

    .release-art:hover {
      transform: scale(1.02) rotate(0.5deg);
      box-shadow: 0 30px 40px -14px rgba(0, 0, 0, 0.3);
    }

    /* countdown grid premium */
    .countdown-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.6rem;
      margin: 2.2rem 0 1.8rem;
    }

    .time-block {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      min-width: 110px;
      padding: 1.2rem 0.5rem;
      text-align: center;
      box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0, 0, 0, 0.02);
      transition: all 0.3s ease;
      cursor: default;
    }

    .time-block:hover {
      transform: translateY(-8px);
      background: white;
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
    }

    .time-number {
      font-size: 3.4rem;
      font-weight: 800;
      font-feature-settings: "tnum";
      font-variant-numeric: tabular-nums;
      color: #1c4e6e;
      line-height: 1.1;
      letter-spacing: 2px;
      transition: transform 0.2s ease;
      display: inline-block;
    }

    /* animation for number change (hard pop) */
    .number-pop {
      animation: numberPop 0.28s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    @keyframes numberPop {
      0% { transform: scale(0.92); opacity: 0.6; }
      80% { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }

    .time-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #5f7f9a;
      margin-top: 8px;
    }

    /* release status message */
    .release-status {
      background: rgba(44, 90, 122, 0.08);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 0.6rem 1.6rem;
      display: inline-block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1f5e7e;
      margin: 0.6rem 0;
      border: 1px solid rgba(44, 90, 122, 0.2);
    }

    .release-date {
      font-family: monospace;
      font-weight: 500;
      background: #eef3fc;
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 50px;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      color: #2b4f6c;
    }

    /* footer credits */
    .footer-modern {
      margin-top: 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(100, 120, 140, 0.2);
      font-size: 0.85rem;
      font-weight: 500;
      color: #4f6f8a;
    }

    .creator-highlight {
      background: linear-gradient(120deg, #1f5e7e, #2c4f6e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .social-icon {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* responsive mobile */
    @media (max-width: 680px) {
      .countdown-container {
        padding: 1rem;
      }
      .premium-card {
        padding: 1.5rem;
        border-radius: 2rem;
      }
      h1 {
        font-size: 2.2rem;
      }
      .time-block {
        min-width: 75px;
        padding: 0.8rem 0.2rem;
      }
      .time-number {
        font-size: 2rem;
      }
      .time-label {
        font-size: 0.65rem;
        letter-spacing: 1px;
      }
      .countdown-grid {
        gap: 0.8rem;
      }
      .footer-modern {
        flex-direction: column;
        text-align: center;
        gap: 0.6rem;
      }
      .release-art {
        max-width: 160px;
      }
    }

    @media (max-width: 480px) {
      .time-number {
        font-size: 1.8rem;
      }
      .time-block {
        min-width: 68px;
      }
    }

    /* hard animation on initial load */
    .premium-card {
      animation: cardGlide 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardGlide {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .time-block {
      animation: blockFadeUp 0.5s ease-out backwards;
    }

    .time-block:nth-child(1) { animation-delay: 0.1s; }
    .time-block:nth-child(2) { animation-delay: 0.2s; }
    .time-block:nth-child(3) { animation-delay: 0.3s; }
    .time-block:nth-child(4) { animation-delay: 0.4s; }

    @keyframes blockFadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* additional modern hover micro */
    .release-status {
      transition: all 0.25s;
    }
    .release-status:hover {
      background: rgba(44, 90, 122, 0.15);
      transform: scale(1.01);
    }
  </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="countdown-container">
  <div class="premium-card">
    <div class="brand-section">
      <div class="badge">✦ LIMITED LAUNCH ✦</div>
      <h1>SULA MD</h1>
      <div class="subhead">Next‑Gen WhatsApp Intelligence</div>
    </div>

    <!-- Image from catbox -->
    <div class="image-wrapper">
      <img class="release-art" src="https://files.catbox.moe/xiy0uc.jpg" alt="SULA MD premium visual" loading="eager">
    </div>

    <!-- Premium Countdown Grid -->
    <div class="countdown-grid">
      <div class="time-block" id="daysBlock">
        <div class="time-number" id="days">00</div>
        <div class="time-label">DAYS</div>
      </div>
      <div class="time-block" id="hoursBlock">
        <div class="time-number" id="hours">00</div>
        <div class="time-label">HOURS</div>
      </div>
      <div class="time-block" id="minutesBlock">
        <div class="time-number" id="minutes">00</div>
        <div class="time-label">MINUTES</div>
      </div>
      <div class="time-block" id="secondsBlock">
        <div class="time-number" id="seconds">00</div>
        <div class="time-label">SECONDS</div>
      </div>
    </div>

    <!-- status and release info -->
    <div style="text-align: center;">
      <div class="release-status" id="statusMessage">
        🌟 COUNTDOWN TO REVOLUTION 🌟
      </div>
      <div class="release-date">
        📅 RELEASE DATE: APRIL 5, 2026 — 00:00 (YOUR LOCAL TIME)
      </div>
    </div>

    <!-- modern footer with THENUX credits -->
    <div class="footer-modern">
      <div class="social-icon">
        <span>⚡ SULA ECOSYSTEM</span>
      </div>
      <div>
        WEB CREATOR: <span class="creator-highlight">THENUX</span> ✦ PREMIUM EDITION
      </div>
      <div>
        <span>✨ #SULA_MD</span>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // Target: April 5, 2026, local midnight (user's timezone)
    const targetDate = new Date(2026, 3, 5, 0, 0, 0); // month is 0-index: 3 = April

    const daysElement = document.getElementById('days');
    const hoursElement = document.getElementById('hours');
    const minutesElement = document.getElementById('minutes');
    const secondsElement = document.getElementById('seconds');
    const statusMsgDiv = document.getElementById('statusMessage');

    // Store previous values to trigger animation only when changed
    let prevDays = -1, prevHours = -1, prevMins = -1, prevSecs = -1;

    // Helper to add pop animation class and remove after timeout
    function addPopAnimation(element) {
      if (!element) return;
      element.classList.add('number-pop');
      setTimeout(() => {
        element.classList.remove('number-pop');
      }, 280);
    }

    function updateCountdown() {
      const now = new Date();
      const diffMs = targetDate - now;

      if (diffMs <= 0) {
        // Release time arrived
        daysElement.innerText = '00';
        hoursElement.innerText = '00';
        minutesElement.innerText = '00';
        secondsElement.innerText = '00';
        statusMsgDiv.innerHTML = '🚀 LAUNCHED — EXPERIENCE THE FUTURE 🚀';
        statusMsgDiv.style.background = "rgba(0, 80, 100, 0.12)";
        statusMsgDiv.style.borderColor = "#2c7a5e";
        return;
      }

      const totalSeconds = Math.floor(diffMs / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      // Format with leading zeros
      const daysStr = days.toString().padStart(2, '0');
      const hoursStr = hours.toString().padStart(2, '0');
      const minutesStr = minutes.toString().padStart(2, '0');
      const secondsStr = seconds.toString().padStart(2, '0');

      // Update DOM with animation only if value changed
      if (prevDays !== daysStr) {
        daysElement.innerText = daysStr;
        addPopAnimation(daysElement);
        prevDays = daysStr;
      } else {
        daysElement.innerText = daysStr;
      }

      if (prevHours !== hoursStr) {
        hoursElement.innerText = hoursStr;
        addPopAnimation(hoursElement);
        prevHours = hoursStr;
      } else {
        hoursElement.innerText = hoursStr;
      }

      if (prevMins !== minutesStr) {
        minutesElement.innerText = minutesStr;
        addPopAnimation(minutesElement);
        prevMins = minutesStr;
      } else {
        minutesElement.innerText = minutesStr;
      }

      if (prevSecs !== secondsStr) {
        secondsElement.innerText = secondsStr;
        addPopAnimation(secondsElement);
        prevSecs = secondsStr;
      } else {
        secondsElement.innerText = secondsStr;
      }

      // dynamic status message with premium vibe
      if (days === 0 && hours < 1) {
        statusMsgDiv.innerHTML = '⏳ FINAL HOUR — ALMOST HERE ⏳';
      } else if (days === 0 && hours < 12) {
        statusMsgDiv.innerHTML = '⚡ ULTIMATE COUNTDOWN — PREPARE ⚡';
      } else if (days <= 2) {
        statusMsgDiv.innerHTML = '✨ INTENSE COUNTDOWN — STAY TUNED ✨';
      } else {
        statusMsgDiv.innerHTML = '🌟 OFFICIAL COUNTDOWN — GET READY 🌟';
      }
    }

    // Initial call
    updateCountdown();
    // Update every second
    const interval = setInterval(updateCountdown, 1000);

    // Cleanup interval on page unload (optional but good practice)
    window.addEventListener('beforeunload', () => {
      clearInterval(interval);
    });
  })();

  // Additional hard animations: add ripple effect to time blocks on hover
  // Also enhance smoothness: ensure all transitions are GPU accelerated.
  (function addPremiumInteractions() {
    const blocks = document.querySelectorAll('.time-block');
    blocks.forEach(block => {
      block.addEventListener('mouseenter', (e) => {
        // subtle ripple effect using pseudo-element via class (create dynamic)
        const ripple = document.createElement('span');
        ripple.className = 'ripple-effect';
        ripple.style.position = 'absolute';
        ripple.style.borderRadius = 'inherit';
        ripple.style.top = '0';
        ripple.style.left = '0';
        ripple.style.width = '100%';
        ripple.style.height = '100%';
        ripple.style.pointerEvents = 'none';
        ripple.style.background = 'radial-gradient(circle, rgba(100,160,200,0.2) 0%, rgba(255,255,255,0) 80%)';
        ripple.style.opacity = '0';
        ripple.style.transition = 'opacity 0.3s ease';
        block.style.position = 'relative';
        block.appendChild(ripple);
        requestAnimationFrame(() => {
          ripple.style.opacity = '1';
        });
        setTimeout(() => {
          if (ripple && ripple.remove) ripple.remove();
        }, 400);
      });
    });
  })();

  // Add extra sophisticated smooth parallax effect on image (modern minimal)
  (function subtleParallax() {
    const img = document.querySelector('.release-art');
    if (!img) return;
    window.addEventListener('mousemove', (e) => {
      const mouseX = e.clientX / window.innerWidth;
      const mouseY = e.clientY / window.innerHeight;
      const moveX = (mouseX - 0.5) * 8;
      const moveY = (mouseY - 0.5) * 6;
      img.style.transform = `translate(${moveX * 0.5}px, ${moveY * 0.5}px) scale(1.01)`;
    });
    window.addEventListener('mouseleave', () => {
      img.style.transform = 'translate(0px, 0px) scale(1)';
    });
  })();

  // animate gradient background slightly for extra smooth motion
  (function animateGradient() {
    let tick = 0;
    const bgDiv = document.querySelector('.animated-bg');
    if (!bgDiv) return;
    function shiftBackground() {
      tick += 0.002;
      const x = 30 + Math.sin(tick) * 15;
      const y = 40 + Math.cos(tick * 0.7) * 10;
      bgDiv.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(255,250,235,0.85) 0%, rgba(225,235,245,0.92) 100%)`;
      requestAnimationFrame(shiftBackground);
    }
    shiftBackground();
  })();

  // Add dynamic class for number pop prevention (ensure every second the number pop only on change is already done)
  // Extra 'hard animation': on load, time blocks individually have elastic effect.
  document.addEventListener('DOMContentLoaded', () => {
    const timeNumbers = document.querySelectorAll('.time-number');
    timeNumbers.forEach((num, idx) => {
      num.style.animation = 'none';
      setTimeout(() => {
        num.style.animation = 'numberPop 0.4s cubic-bezier(0.2, 1.2, 0.8, 1)';
        setTimeout(() => { num.style.animation = ''; }, 450);
      }, idx * 120);
    });
  });
</script>
<style>
  /* additional modern ripple utility */
  .time-block {
    transition: transform 0.25s ease, box-shadow 0.3s ease;
    overflow: hidden;
  }
  .ripple-effect {
    border-radius: inherit;
    transform: scale(1);
  }
  .release-art {
    transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s;
    will-change: transform;
  }
  .time-number {
    transition: text-shadow 0.2s;
  }
  /* slight neon glow on numbers on hover? but modern, keep minimal premium */
  .time-block:hover .time-number {
    text-shadow: 0 2px 8px rgba(40, 100, 130, 0.2);
  }
  /* ensure counters use tabular nums */
  .time-number {
    font-variant-numeric: tabular-nums;
  }
  .premium-card {
    transition: transform 0.4s cubic-bezier(0.2, 0.85, 0.4, 1), box-shadow 0.4s;
  }
  /* make image responsive and rounded */
  .release-art {
    object-fit: cover;
    aspect-ratio: 1 / 1;
    object-position: center;
  }
  /* soft focus ring for accessibility */
  .time-block:focus-visible {
    outline: 2px solid #2c5a7a;
    outline-offset: 2px;
  }
</style>
</body>
</html>
